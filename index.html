<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midsommarquiz</title>
    <style>
        :root {
            --teal: #2f6f73;
            --teal-dark: #245155;
            --ink: #1f2933;
        }

        * { box-sizing: border-box; }

        html, body { margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #aee3f5 0%, #eaf3df 52%, #dcebc2 100%);
            background-attachment: fixed;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: clamp(28px, 7vw, 44px);
            text-align: center;
            box-shadow: 0 18px 50px rgba(31, 41, 51, 0.18);
        }

        .flowers {
            font-size: clamp(2.4rem, 11vw, 3.4rem);
            line-height: 1;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 7vw, 2.6rem);
            line-height: 1.1;
            color: var(--teal-dark);
        }

        p.lead {
            margin: 0 0 28px;
            font-size: clamp(1rem, 4vw, 1.15rem);
            line-height: 1.5;
            color: #3e4c59;
        }

        a.cta {
            display: block;
            width: 100%;
            padding: 16px 20px;
            min-height: 54px;
            background: var(--teal);
            color: #fff;
            font-size: clamp(1.05rem, 4.5vw, 1.25rem);
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            box-shadow: 0 6px 16px rgba(47, 111, 115, 0.35);
            transition: transform 0.06s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        a.cta:hover { background: var(--teal-dark); }
        a.cta:active { transform: translateY(1px); box-shadow: 0 3px 10px rgba(47, 111, 115, 0.3); }
        a.cta:focus-visible { outline: 3px solid #ffb703; outline-offset: 3px; }

        p.hint {
            margin: 16px 0 0;
            font-size: 0.85rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="flowers" aria-hidden="true">🌼🌿🌼</div>
        <h1>Midsommarquiz</h1>
        <p class="lead">20 påståenden om framtiden — vad tror du? Svara och se vad alla andra gissar i sommarvärmen.</p>
        <a class="cta" href="http://bjornix.cs.lth.se:8096/quizly/">Starta quizet&nbsp;→</a>
        <p class="hint">Funkar i mobilen — svaren sparas automatiskt.</p>
    </main>
</body>
</html>
